; ----------------------------------------------------------------------------
; E-Digital — PHP performance tuning (mounted into the WordPress container)
; ----------------------------------------------------------------------------

; Mémoire & temps d'exécution
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
post_max_size = 128M
upload_max_filesize = 128M
max_input_vars = 5000

; Affichage erreurs : on désactive l'affichage HTML (qui cassait les headers)
; mais on conserve le log pour debug via wp-content/debug.log.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; OPcache — réduit drastiquement le temps de chargement WP/Elementor
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.save_comments = 1

; Realpath cache (gros gain WordPress)
realpath_cache_size = 4096k
realpath_cache_ttl = 600
