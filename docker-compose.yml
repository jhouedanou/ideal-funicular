services:
  db:
    image: mariadb:11
    container_name: edigital-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: edigital
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: edigital-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    volumes:
      - redis_data:/data

  wordpress:
    build:
      context: ./docker/wordpress
    image: edigital-wp:latest
    container_name: edigital-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: edigital
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_TABLE_PREFIX: wp_
      # Debug : on log dans wp-content/debug.log mais on n'affiche RIEN dans la
      # sortie HTML (sinon "headers already sent"). Voir docker/mu-plugins/.
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        @ini_set( 'display_errors', 0 );
        define( 'WP_MEMORY_LIMIT', '512M' );
        define( 'WP_MAX_MEMORY_LIMIT', '512M' );
        define( 'FS_METHOD', 'direct' );
        define( 'AUTOMATIC_UPDATER_DISABLED', true );
        define( 'WP_AUTO_UPDATE_CORE', false );
        # define( 'DISALLOW_FILE_MODS', true );   // décommenté en prod uniquement
        define( 'DISALLOW_FILE_EDIT', true );
        define( 'WP_REDIS_HOST', 'redis' );
        define( 'WP_REDIS_PORT', 6379 );
        define( 'WP_REDIS_DATABASE', 0 );
    volumes:
      - wp_data:/var/www/html
      - ./wp-theme-edigital:/var/www/html/wp-content/themes/edigital
      - ./docker/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./docker/php/php-tuning.ini:/usr/local/etc/php/conf.d/zz-edigital-tuning.ini:ro

  wp-install:
    image: wordpress:cli-php8.2
    container_name: edigital-wp-install
    depends_on:
      wordpress:
        condition: service_started
      db:
        condition: service_healthy
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
      - ./wp-theme-edigital:/var/www/html/wp-content/themes/edigital
      - ./docker/init:/docker-init:ro
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: edigital
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_TABLE_PREFIX: wp_
      WP_URL: http://localhost:8080
      WP_TITLE: E-Digital
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: admin
      WP_ADMIN_EMAIL: admin@edigital.local
    entrypoint: ["/bin/sh", "/docker-init/install.sh"]
    restart: "no"

  backup:
    build: ./docker/backup
    image: edigital-backup:latest
    container_name: edigital-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: edigital
      DB_USER: root
      DB_PASSWORD: rootpass
      BACKUP_DIR: /backups
      BACKUP_KEEP: 14          # nombre de dumps conservés
      BACKUP_INTERVAL: 86400   # 24h entre deux dumps (mode schedule)
    volumes:
      - ./docker/backups:/backups
    # profiles: backup = démon planifié ; sans profile = utilisable via `run --rm`
    profiles: ["backup"]
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: edigital-pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
      UPLOAD_LIMIT: 128M

volumes:
  db_data:
  wp_data:
  redis_data:
